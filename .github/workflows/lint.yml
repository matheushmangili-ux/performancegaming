name: PSScriptAnalyzer

on:
  push:
    branches: [main]
    paths: ['**.ps1']
  pull_request:
    branches: [main]
    paths: ['**.ps1']

jobs:
  lint:
    name: Lint PowerShell
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Error','Warning') `
                     -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions,PSAvoidUsingPositionalParameters
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object Severity -eq 'Error'
            if ($errors) {
              Write-Error "Found $($errors.Count) error(s)."
              exit 1
            }
            Write-Host "Warnings only - passing." -ForegroundColor Yellow
          } else {
            Write-Host "Clean." -ForegroundColor Green
          }
